<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AG OS decision</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="mobile-decision-page">
  <main class="mobile-decision-card">
    <p class="section-kicker">AG OS owner decision</p>
    <h1>Approve or reject one exact job</h1>
    <p id="mobile-decision-detail">Checking the signed, expiring decision link…</p>
    <div class="mobile-decision-actions">
      <button id="mobile-approve" type="button">Approve once</button>
      <button id="mobile-reject" type="button" class="job-reject">Reject</button>
    </div>
    <p id="mobile-decision-status">Opening this page does not approve anything.</p>
  </main>
  <script src="./mobile-approval.js"></script>
</body>
</html>
