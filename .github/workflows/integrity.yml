name: AG OS Scheduled Integrity Run

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  integrity:
    name: Daily integrity run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate foundation
        id: validate
        run: npm run validate

      - name: Boot check
        id: boot
        run: npm run boot:check

      - name: Security scan
        id: scan
        run: npm run security:scan

      - name: Run tests
        id: tests
        run: node --test tests/*.test.mjs

      - name: Report failure as issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const failedStep = ["validate", "boot", "scan", "tests"].find(
              (id) => "${{ steps.validate.outcome }}" === "failure" && id === "validate"
                || "${{ steps.boot.outcome }}" === "failure" && id === "boot"
                || "${{ steps.scan.outcome }}" === "failure" && id === "scan"
                || "${{ steps.tests.outcome }}" === "failure" && id === "tests"
            ) || "unknown";
            const title = "AG OS integrity failure";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The scheduled integrity run failed at step: **${failedStep}**.`,
              "",
              `Run: ${runUrl}`,
              `Commit: ${context.sha}`,
              "",
              "This issue is maintained automatically by the scheduled integrity workflow.",
              "It performs no other live actions."
            ].join("\n");
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              creator: "github-actions[bot]"
            });
            const issue = existing.data.find((item) => item.title === title);
            if (issue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
